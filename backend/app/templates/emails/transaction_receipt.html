<div style="font-family:'DM Sans',system-ui,sans-serif;max-width:560px;margin:0 auto;padding:24px">
  <div style="text-align:center;margin-bottom:24px">
    <span style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:#E8602C;letter-spacing:5px">ALTHY</span>
  </div>

  <h2 style="color:#3D3830;font-size:20px;font-weight:600;margin:0 0 12px">Reçu de transaction</h2>

  <p style="color:#5C5650;font-size:14px;line-height:1.6;margin:0 0 20px">
    Bonjour {prenom},
  </p>

  <div style="background:#FAFAF8;border:1px solid #E8E4DC;border-radius:12px;padding:20px;margin-bottom:20px">
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-size:28px;font-weight:700;color:#3D3830">CHF {montant}</div>
      <div style="font-size:12px;color:#7A7469;margin-top:4px">{type_transaction}</div>
    </div>
    <table style="width:100%;font-size:13px;color:#5C5650">
      <tr><td style="padding:4px 0;font-weight:600;color:#3D3830">Référence</td><td style="padding:4px 0;text-align:right">{reference}</td></tr>
      <tr><td style="padding:4px 0;font-weight:600;color:#3D3830">Date</td><td style="padding:4px 0;text-align:right">{date}</td></tr>
      <tr><td style="padding:4px 0;font-weight:600;color:#3D3830">Bien</td><td style="padding:4px 0;text-align:right">{adresse}</td></tr>
      <tr><td style="padding:4px 0;font-weight:600;color:#3D3830">Statut</td><td style="padding:4px 0;text-align:right;color:#16A34A;font-weight:600">{statut}</td></tr>
    </table>
  </div>

  <div style="text-align:center;margin-bottom:24px">
    <a href="{link}" style="display:inline-block;padding:12px 28px;background:#E8602C;color:#fff;border-radius:10px;font-size:14px;font-weight:700;text-decoration:none">
      Voir le détail
    </a>
  </div>

  <hr style="border:none;border-top:1px solid #E8E4DC;margin:24px 0" />
  <p style="font-size:12px;color:#7A7469;text-align:center;margin:0">
    Cet email a été envoyé par <a href="https://althy.ch" style="color:#E8602C;text-decoration:none">Althy</a> — l'assistant immobilier suisse.
  </p>
</div>
