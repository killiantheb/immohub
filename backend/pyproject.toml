[tool.ruff]
target-version = "py312"
line-length = 100
src = ["app"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "C4", "SIM"]
ignore = [
    "E501",   # line too long — handled by formatter
    "B008",   # do not perform function call in argument defaults (FastAPI Depends pattern)
    "B904",   # raise-without-from-inside-except — too noisy for FastAPI HTTPException pattern
    "SIM102", # nested if — sometimes clearer than single if
    "SIM105", # suppress — try/except/pass is more explicit here
    "SIM117", # allow nested with
]

[tool.ruff.lint.per-file-ignores]
"alembic/**" = ["E402", "F401", "I001"]
"app/models/__init__.py" = ["F401"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_return_any = false
no_strict_optional = true
explicit_package_bases = true
exclude = ["alembic/", "venv/", "\\.venv/"]

[[tool.mypy.overrides]]
module = [
    "app.routers.ai",
    "app.schemas.auth",
    "app.services.company_service",
    "app.services.property_service",
]
ignore_errors = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
filterwarnings = ["ignore::DeprecationWarning"]
